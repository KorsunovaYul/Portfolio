<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korshunova — Проекты</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="projects.css">
</head>

<body>

<header class="header">
  <div class="container header__inner">
    <a href="index.html" class="logo">
      <img src="img/logo.svg" alt="">
      <span>Korshunova</span>
    </a>

    <nav class="nav">
      <a href="index.html">Обо мне</a>
      <a href="#contacts">Контакты</a>
      <span class="btn btn--active">Проекты</span>
    </nav>
  </div>
</header>

<main>

<section class="projects-hero">
  <div class="container">
    <div class="projects-hero__content">
      <img class="decor decor--star-big" src="img/star-big.svg" alt="">
      <h1>Проекты</h1>
    </div>
  </div>
</section>

<section class="projects-section">
  <div class="container">
    <div class="projects-grid">

      <!-- Первый ряд: Purrfect Paws Spa и Re:Крой -->
      <div class="projects-row">
        <!-- Purrfect Paws Spa -->
        <a href="Purrfect_Raws_Spa.html" class="project-card project-card--left">
          <div class="project-card__header">
            <h2>Purrfect Paws Spa</h2>
            <p>// сайт</p>
          </div>
          <div class="project-card__bg project-card__bg--orange"></div>
          <img src="img/Purrfect Raws Spa.png" alt="Purrfect Paws Spa" class="project-card__image">
        </a>

        <!-- Re:Крой -->
        <a href="Re_Kroy.html" class="project-card project-card--right">
          <div class="project-card__header">
            <h2>Re:Крой</h2>
            <p>// приложение и промо-сайт</p>
          </div>
          <div class="project-card__bg project-card__bg--green"></div>
          <img src="img/Re kroy.png" alt="Re:Крой" class="project-card__image">
        </a>
      </div>

      <!-- Второй ряд: Башлы Кэше и Робот Фьёрли -->
      <div class="projects-row">
        <!-- Башлы Кэше -->
        <a href="Bashly_Keshe.html" class="project-card project-card--left">
          <div class="project-card__header">
            <h2>Башлы Кэше</h2>
            <p>// мобильное приложение</p>
          </div>
          <div class="project-card__bg project-card__bg--green-narrow"></div>
          <img src="img/Башлы Кэше.png" alt="Башлы Кэше" class="project-card__image project-card__image--bashly">
        </a>

        <!-- Робот Фьёрли -->
        <a href="Robot_Fyorli.html" class="project-card project-card--right">
          <div class="project-card__header">
            <h2>Робот Фьёрли</h2>
            <p>// мобильное приложение</p>
          </div>
          <div class="project-card__bg project-card__bg--orange-narrow"></div>
          <img src="img/Робот Фьёрли.png" alt="Робот Фьёрли" class="project-card__image project-card__image--robot">
        </a>
      </div>

      <!-- Третий ряд: Зверополис + звёздочки справа -->
      <div class="projects-row projects-row--bottom">
        <a href="Zveropolis.html" class="project-card project-card--wide">
          <div class="project-card__header">
            <h2>Зверополис</h2>
            <p>// терминал к выставке</p>
          </div>
          <div class="project-card__bg project-card__bg--orange-wide"></div>
          <img src="img/Зверополис.png" alt="Зверополис" class="project-card__image project-card__image--zveropolis">
        </a>

        <!-- Звёздочки справа от Зверополиса -->
        <div class="projects-decor">
          <img class="decor decor--star" src="img/star.svg" alt="">
          <img class="decor decor--star-big" src="img/star-big.svg" alt="">
        </div>
      </div>

    </div>
  </div>
</section>

<section class="contacts contacts--projects" id="contacts">
  <div class="container grid contacts__grid">
    <div class="contacts__content">
      <h2>Контакты</h2>

      <div class="contacts__row">
        <a href="mailto:korsyulia@yandex.ru" class="contacts__item">
          <img src="img/email.svg" alt="" class="contacts__icon">
          <span>korsyulia@yandex.ru</span>
        </a>
        <a href="https://t.me/Yulishaz" class="contacts__item">
          <img src="img/telegram.svg" alt="" class="contacts__icon">
          <span>@Yulishaz</span>
        </a>
        <a href="tel:88888888888" class="contacts__item">
          <img src="img/phone.svg" alt="" class="contacts__icon">
          <span>8 888-888-(88-88)</span>
        </a>
      </div>
    </div>

    <a href="#" class="scroll-up">
      <svg class="scroll-up__svg" width="94" height="90" viewBox="0 0 94 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M90.6475 45.5056L3.21889 45.5056" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
        <path d="M2.09815 43.5738L41.1259 5.20379C41.9572 4.38652 43.3418 5.45259 42.7895 6.47921C26.6225 36.5305 26.5753 55.269 42.088 82.7337C42.6707 83.7653 41.2412 84.9096 40.3964 84.0789L2.09815 46.4262C1.30101 45.6425 1.30101 44.3575 2.09815 43.5738Z" fill="currentColor" stroke="currentColor" stroke-width="3"/>
      </svg>
    </a>
  </div>
</section>

</main>

<script>
  // Плавный скролл к контактам
  document.querySelectorAll('a[href="#contacts"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      e.preventDefault();
      const contacts = document.querySelector('#contacts');
      if (contacts) {
        contacts.scrollIntoView({ behavior: 'smooth' });
      }
    });
  });
</script>

</body>
</html>
